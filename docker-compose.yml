
version: "3"

services:

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "3000:3000"

  cypress:
    build:
      context: .
      dockerfile: docker/tests/Dockerfile
    depends_on:
      - web
    command: npx cypress run --config baseUrl=http://192.168.1.132:3000